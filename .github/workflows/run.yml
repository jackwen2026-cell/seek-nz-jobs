name: Auto Scrape SEEK NZ

on:
  schedule:
    - cron: '0 22,10 * * *' # 每天定时自动运行两次
  workflow_dispatch: # 允许你随时手动点击运行

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # 🌟 已升级到最新的 v4

      - name: Set up Python
        uses: actions/setup-python@v5  # 🌟 已升级到最新的 v5
        with:
          python-version: '3.11' # 升级到更稳定的 Python 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas
          playwright install chromium

      - name: Run scraper
        run: python seek_spider.py

      - name: Commit and push updates
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add index.html
          git commit -m "Auto-update latest NZ blue-collar jobs" || exit 0
          git push
